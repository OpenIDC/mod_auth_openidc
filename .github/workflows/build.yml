name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y apache2-dev libcjose-dev libssl-dev check pkg-config
        sudo apt-get install -y libjansson-dev libcurl4-openssl-dev libhiredis-dev libpcre2-dev libjq-dev check
    - name: Configure
      run: |
        ./autogen.sh
        ./configure --with-jq
    - name: Make
      run: make
    - name: Test
      run: make check || (cat test/test-suite.log && exit -1)

  valgrind:
    runs-on: ubuntu-latest
    # `make valgrind` defaults OIDC_TEST_REDIS_SERVER/OIDC_TEST_MEMCACHE_SERVER
    # to localhost (see test/Makefile.am), so the live test_cache tcases run
    # under valgrind too -- leak-checking the real cache/redis.c +
    # cache/memcache.c paths the mocks bypass
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211
    steps:
    - uses: actions/checkout@v5
    - name: Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y apache2-dev libcjose-dev libssl-dev check pkg-config
        sudo apt-get install -y libjansson-dev libcurl4-openssl-dev libhiredis-dev libpcre2-dev libjq-dev check
        sudo apt-get install -y valgrind
    - name: Configure
      run: |
        ./autogen.sh
        ./configure --with-jq
    - name: Make
      run: make
    - name: Wait for service containers
      run: |
        for i in $(seq 1 30); do
          (exec 3<>/dev/tcp/localhost/6379) 2>/dev/null \
            && (exec 3<>/dev/tcp/localhost/11211) 2>/dev/null \
            && { echo "redis + memcached reachable"; exit 0; }
          echo "waiting for service containers ($i)..."; sleep 1
        done
        echo "service containers did not become reachable"; exit 1
    - name: Valgrind
      run: make valgrind

  distcheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y apache2-dev libcjose-dev libssl-dev check pkg-config
        sudo apt-get install -y libjansson-dev libcurl4-openssl-dev libhiredis-dev libpcre2-dev libjq-dev check
    - name: Configure
      run: |
        ./autogen.sh
        ./configure --with-jq
    - name: Make
      run: make
    - name: Distcheck
      run: make distcheck DESTDIR=/tmp/mod_auth_openidc

  coverage:
    runs-on: ubuntu-latest
    # check-code-coverage defaults OIDC_TEST_REDIS_SERVER/OIDC_TEST_MEMCACHE_SERVER
    # to localhost (see test/Makefile.am), so the live test_cache tcases run here
    # too -- give them the servers, which also folds the real cache/redis.c +
    # cache/memcache.c paths into the coverage report
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211
    steps:
    - uses: actions/checkout@v5
    - name: Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y apache2-dev libcjose-dev libssl-dev check pkg-config
        sudo apt-get install -y libjansson-dev libcurl4-openssl-dev libhiredis-dev libpcre2-dev libjq-dev check
        sudo apt-get install -y lcov
    - name: Configure
      run: |
        ./autogen.sh
        ./configure --with-jq --enable-code-coverage
    - name: Wait for service containers
      run: |
        for i in $(seq 1 30); do
          (exec 3<>/dev/tcp/localhost/6379) 2>/dev/null \
            && (exec 3<>/dev/tcp/localhost/11211) 2>/dev/null \
            && { echo "redis + memcached reachable"; exit 0; }
          echo "waiting for service containers ($i)..."; sleep 1
        done
        echo "service containers did not become reachable"; exit 1
    - name: Coverage
      run: |
        make check-code-coverage \
          CODE_COVERAGE_OUTPUT_FILE=coverage.info \
          CODE_COVERAGE_OUTPUT_DIRECTORY=coverage-report \
          2>&1 | tee coverage.log || { cat test/test-suite.log; exit 1; }
    # minimum-line-coverage gate: last measured 85.5% (2026-07-02); the floor sits at 85 to
    # absorb run-to-run wobble from the live redis/memcache tcases. Bump it in the same PR
    # that raises coverage meaningfully. NB: this also indirectly fails the job on test
    # failures, which the AX_CODE_COVERAGE "-make -k check" recipe otherwise swallows.
    - name: Enforce minimum line coverage
      run: lcov --summary test/coverage.info --fail-under-lines 85
    - name: Summary
      if: always()
      run: |
        {
          echo '## Code coverage'
          echo '```'
          sed -n '/Overall coverage rate/,/functions/p' coverage.log | grep . \
            || tail -n 20 coverage.log
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
    - name: Upload report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: |
          test/coverage-report
          test/coverage.info
        if-no-files-found: warn

  fuzz:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y apache2-dev libcjose-dev libssl-dev check pkg-config
        sudo apt-get install -y libjansson-dev libcurl4-openssl-dev libhiredis-dev libpcre2-dev libjq-dev check
        sudo apt-get install -y clang
    - name: Configure
      run: |
        ./autogen.sh
        ./configure --with-jq
    - name: Make
      run: make
    - name: Build fuzz targets (clang + ASan/UBSan)
      run: test/fuzz/build.sh
    - name: Replay seed corpora under sanitizers
      run: |
        cd test/fuzz
        for t in base64 url jwt json; do
          echo "== replay fuzz_$t =="
          ./build/fuzz_$t corpus/$t/*
        done
        # the curated open-redirect payloads, one libFuzzer input per file
        tmp=$(mktemp -d); i=0
        while IFS= read -r line; do printf '%s' "$line" > "$tmp/p$i"; i=$((i + 1)); done \
          < ../open-redirect-payload-list.txt
        ./build/fuzz_url "$tmp"/*
    - name: Short fuzzing run
      run: |
        cd test/fuzz
        for t in base64 url jwt json; do
          echo "== fuzz_$t =="
          ./build/fuzz_$t -max_total_time=30 -print_final_stats=1 corpus/$t
        done
    - name: Upload crashes
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: fuzz-crashes
        path: |
          test/fuzz/crash-*
          test/fuzz/oom-*
          test/fuzz/timeout-*
        if-no-files-found: ignore

  sanitizers:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y apache2-dev libcjose-dev libssl-dev check pkg-config
        sudo apt-get install -y libjansson-dev libcurl4-openssl-dev libhiredis-dev libpcre2-dev libjq-dev check
    - name: Configure
      # gcc (not clang) avoids the apxs -ffat-lto-objects flag clang rejects;
      # -U_FORTIFY_SOURCE drops the fortify macros that conflict with ASan;
      # -fno-sanitize-recover makes UBSan abort so a finding fails the build.
      # alignment/nonnull-attribute/pointer-overflow are excluded as benign on
      # the supported arches: the shm cache entry is aligned(64) as a cache-line
      # hint but apr_shm does not 64-byte-align the segment, the curl response
      # accumulator does memcpy(dst, NULL, 0) on the first chunk, and the cache
      # walks entries by byte offset.
      run: |
        ./autogen.sh
        ./configure --with-jq \
          CFLAGS="-g -O1 -fsanitize=address,undefined -fno-sanitize=alignment,nonnull-attribute,pointer-overflow -fno-omit-frame-pointer -fno-sanitize-recover=undefined -U_FORTIFY_SOURCE" \
          LDFLAGS="-fsanitize=address,undefined"
    - name: Make
      run: make
    - name: Test (ASan + UBSan)
      # leak detection is left to the valgrind job (APR pools make ASan leak
      # output noisy); this job targets memory corruption + undefined behaviour
      env:
        ASAN_OPTIONS: detect_leaks=0:abort_on_error=1:strict_string_checks=1:detect_stack_use_after_return=1
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
      run: make check || (cat test/test-suite.log && exit 1)

  cache-backends:
    # Two things the other jobs miss: (1) a gcc-vs-clang build matrix, and
    # (2) the redis/memcache backends run against *live* servers rather than
    # the in-process mocks the unit tests use by default. The redis and
    # memcache dev headers arrive via libhiredis-dev and apache2-dev ->
    # libaprutil1-dev (apr_memcache.h), so HAVE_LIBHIREDIS and HAVE_MEMCACHE
    # are both on; the test_cache "redis-live"/"memcache-live" tcases register
    # only when OIDC_TEST_*_SERVER is set, so they stay off in the other jobs.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211
    env:
      OIDC_TEST_REDIS_SERVER: localhost:6379
      OIDC_TEST_MEMCACHE_SERVER: localhost:11211
    steps:
    - uses: actions/checkout@v5
    - name: Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y apache2-dev libcjose-dev libssl-dev check pkg-config
        sudo apt-get install -y libjansson-dev libcurl4-openssl-dev libhiredis-dev libpcre2-dev libjq-dev check
        sudo apt-get install -y clang
    - name: Configure
      run: |
        ./autogen.sh
        ./configure --with-jq CC=${{ matrix.cc }}
        # the apxs-derived CFLAGS carry gcc-only LTO flags (-flto=auto /
        # -ffat-lto-objects); strip them on the clang leg so an older runner
        # clang cannot choke on them (LTO is not needed for a test build)
        if [ "${{ matrix.cc }}" = "clang" ]; then
          sed -i 's/-flto=auto//g; s/-ffat-lto-objects//g' src/Makefile test/Makefile
        fi
    - name: Make
      run: make
    - name: Wait for service containers
      run: |
        for i in $(seq 1 30); do
          (exec 3<>/dev/tcp/localhost/6379) 2>/dev/null \
            && (exec 3<>/dev/tcp/localhost/11211) 2>/dev/null \
            && { echo "redis + memcached reachable"; exit 0; }
          echo "waiting for service containers ($i)..."; sleep 1
        done
        echo "service containers did not become reachable"; exit 1
    - name: Test (live redis + memcached)
      run: make check || (cat test/test-suite.log && exit 1)

  static-analysis:
    # clang is stricter than the gcc build on type correctness: implicit integer
    # narrowing and incompatible function-pointer casts. These tend to hide in
    # the macro-generated config getters/setters, where the gcc build (which only
    # errors on implicit-function-declaration) stays silent. Build with clang and
    # promote the two high-signal type-check categories to errors so a regression
    # fails the build; the noisier -Wconversion/-Wsign-compare family is left out
    # deliberately (pervasive style warnings the project does not enforce).
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y apache2-dev libcjose-dev libssl-dev check pkg-config
        sudo apt-get install -y libjansson-dev libcurl4-openssl-dev libhiredis-dev libpcre2-dev libjq-dev check
        sudo apt-get install -y clang
    - name: Configure
      run: |
        ./autogen.sh
        ./configure --with-jq CC=clang \
          CFLAGS="-g -O2 -Werror=implicit-int-conversion -Werror=cast-function-type-mismatch"
        # the apxs-derived CFLAGS carry gcc-only LTO flags (-flto=auto /
        # -ffat-lto-objects); strip them on the clang leg so an older runner
        # clang cannot choke on them (LTO is irrelevant for an analysis build)
        sed -i 's/-flto=auto//g; s/-ffat-lto-objects//g' src/Makefile test/Makefile
    - name: Make (clang, type checks promoted to errors)
      run: make

  clang-tidy:
    # narrow, warning-free lint baseline: the check set and the
    # conventions-based exclusions live in .clang-tidy, which sets
    # WarningsAsErrors so any new finding fails the build close to the
    # change instead of surfacing post-hoc in SonarCloud
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y apache2-dev libcjose-dev libssl-dev check pkg-config
        sudo apt-get install -y libjansson-dev libcurl4-openssl-dev libhiredis-dev libpcre2-dev libjq-dev check
        sudo apt-get install -y clang-tidy bear
    - name: Configure
      run: |
        ./autogen.sh
        ./configure --with-jq
    - name: Compilation database
      run: |
        bear -- make -C src
        # the apxs-derived CFLAGS carry gcc-only LTO flags (-flto=auto /
        # -ffat-lto-objects); strip them from the compilation database so
        # the clang-tidy driver does not trip over them
        sed -i 's/-flto=auto//g; s/-ffat-lto-objects//g' compile_commands.json
    - name: clang-tidy
      run: run-clang-tidy -quiet -p . "src/.*\.c$"
