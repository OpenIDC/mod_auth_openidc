name: SonarQube
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory # Directory where build-wrapper output will be placed
    # the check-code-coverage target in test/Makefile.am defaults
    # OIDC_TEST_REDIS_SERVER/OIDC_TEST_MEMCACHE_SERVER to localhost, so the live
    # test_cache tcases run against the service containers below without a
    # job-level env override
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y apache2-dev libcjose-dev libssl-dev check pkg-config
          sudo apt-get install -y libjansson-dev libcurl4-openssl-dev libhiredis-dev libpcre2-dev libjq-dev check
          sudo apt-get install -y lcov
      - name: Install Build Wrapper
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@v8.2.0
      - name: Wait for service containers
        run: |
          for i in $(seq 1 30); do
            (exec 3<>/dev/tcp/localhost/6379) 2>/dev/null \
              && (exec 3<>/dev/tcp/localhost/11211) 2>/dev/null \
              && { echo "redis + memcached reachable"; exit 0; }
            echo "waiting for service containers ($i)..."; sleep 1
          done
          echo "service containers did not become reachable"; exit 1
      - name: Run build-wrapper
        run: |
          ./autogen.sh
          ./configure --with-jq --enable-code-coverage
          build-wrapper-linux-x86-64 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} make clean check-code-coverage
      - name: Generate gcov reports
        # AX_CODE_COVERAGE leaves .gcda/.gcno under <dir>/.libs/ but does not produce
        # .gcov text files; sonar.cfamily.gcov.reportsPath requires those. Run gcov
        # from the repo root so SF: paths inside the reports are relative to the
        # project base and match sonar.sources=src,
        run: |
          cd src
          find . -path '*/.libs/*.gcda' | while read -r gcda; do
            obj_dir=$(dirname "$gcda")
            src_dir=$(dirname "$obj_dir")
            base=$(basename "$gcda" .gcda)
            gcov -p -o $obj_dir $base.c
          done
      - name: Run sonar-scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        with:
          args: >
            --define sonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json
            --define sonar.cfamily.gcov.reportsPath=src
